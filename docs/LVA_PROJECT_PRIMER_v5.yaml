core_concepts:
  satellite_role: >
    LVA behaves like an ESPHome "voice satellite": Home Assistant initiates and coordinates a run,
    while LVA handles wake words, audio streaming, and local playback/UX (LEDs, sounds, mute).
  primary_protocol: "ESPHome API (aioesphomeapi)"
  primary_audio_stack: "PipeWire or PulseAudio via python 'soundcard' (PulseAudio compat)."

runtime_architecture:
  main_components:
    - name: "ServerState"
      role: "Holds preferences, players, wake words, active state, event bus, entities, etc."
    - name: "VoiceSatelliteProtocol (satellite.py)"
      role: "Implements ESPHome Voice Assistant messages and state machine; routes audio + media control."
    - name: "AudioEngine (audio_engine.py)"
      role: "Captures mic audio, runs wake word models, forwards audio chunks to satellite."
    - name: "MpvMediaPlayer (mpv_player.py)"
      role: "Local playback for music + TTS via mpv; supports duck/unduck and done callbacks."
    - name: "MQTTController"
      role: "MQTT discovery + control topics for mute, effects, LED colors, and preferences controls."
    - name: "LEDController"
      role: "Backend-agnostic LED effects + per-state mapping (idle/listening/thinking/responding/error)."
    - name: "Tray Client (desktop GUI)"
      role: >
        Optional PyQt5 system tray icon + menu for desktops.
        Subscribes to MQTT state/light topics to mirror LVA state/colors and can toggle mute.
        Can start/stop/restart the LVA systemd --user service.

  threads_and_loops:
    asyncio_loop: "Main thread runs asyncio; ESPHome server uses asyncio create_server."
    audio_thread: "AudioEngine runs in a background thread and schedules work on asyncio loop with call_soon_threadsafe."

configuration:
  file: "linux_voice_assistant/config.json"
  parsing: "linux_voice_assistant/config.py (load_config_from_json -> Config dataclasses)"
  key_sections:
    app:
      required: ["name"]
      optional:
        wakeup_sound: "Path/URL played when wake word triggers"
        timer_finished_sound: "Sound played when timer finishes"
        preferences_file: "Preferences JSON (default preferences.json)"
        debug: "Enable extra logging"
    audio:
      input_device: "null | exact device name | numeric index string (soundcard device list)"
      input_block_size: "Capture block size (default 1024)"
      output_device: "null | mpv audio-device string (e.g., pulse/alsa_output...)"
      volume_sync:
        description: >
          When true, LVA will align the system output volume with the stored LVA volume on startup.
          Implemented as a best-effort chain: wpctl -> pactl -> amixer.
        default: false
      max_volume_percent:
        description: >
          Upper bound for volume sync (some devices need >100%, e.g. 150%).
          Used only when volume_sync is true.
        default: 100
    wake_word:
      directories: "Wake-word model directories; defaults to [wakewords, wakewords/openWakeWord]"
      model: "Default wake word model id (e.g., okay_nabu)"
      stop_model: "Stop model id (micro wake word)"
      refractory_seconds: "Debounce window after wake word triggers"
      download_dir: "Directory for downloaded models (relative to repo)"
