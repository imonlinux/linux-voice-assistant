project:
  name: "Linux Voice Assistant (LVA)"
  repo: "imonlinux/linux-voice-assistant"
  summary: >
    A Linux-based voice satellite that exposes an ESPHome Voice Assistant API endpoint to Home Assistant.
    It supports wake-word detection, streaming mic audio to HA for STT/intent handling, TTS playback,
    timers, MQTT discovery/entities, and LED/button integrations (including Seeed ReSpeaker XVF3800 USB 4‑Mic Array).

