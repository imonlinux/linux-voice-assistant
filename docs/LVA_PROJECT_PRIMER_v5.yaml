* Basic player state handling beyond “playing audio” (track state, active stream tracking, stop/cleanup)
* A minimal internal “Sendspin state model” (connected/playing/stopped, volume/mute, metadata)

### ❌ Not complete (but explicitly part of later phases in your roadmap)

* SoundCard sink + timestamp scheduling/jitter buffer
* Voice coordination (duck/pause)
* HA entity (separate media_player)
* Controller send path (HA → Sendspin `client/command`)
* Real multi-device sync validation

---

# 4) “What’s Next” (Next Phase Plan)

You asked for “next phase of development.” Given where you are, the best next phase is:

## Next Phase = “Make it a Real Player”

Meaning:

1. **Apply controller changes locally** (volume/mute/transport)
2. **Track and publish state** (metadata/progress/playback state)
3. **Prepare for HA entity + voice coordination** by defining event contracts now

### 4.1 Must-fix: Volume and mute actually affect playback

Right now MA volume commands update `_volume`, but mpv output doesn’t change.

**Target outcome**

* MA volume slider changes real audio output immediately
* mute toggles audio output immediately
* state you report back matches what you applied

**Implementation options (choose one; recommend A)**

A) **mpv IPC (recommended for your current mpv sink)**

* start mpv with `--input-ipc-server=/tmp/lva_sendspin_mpv.sock` (or per-client unique path)
* on volume/mute commands:

  * send JSON IPC commands: `{"command":["set_property","volume", <0-100>]}`
  * `{"command":["set_property","mute", true/false]}`
* keep `_volume/_muted` in sync with mpv (optional: query property back)

B) restart mpv when volume changes (not recommended)

* audible glitching; heavy; error-prone

C) implement a software volume scaler on PCM before mpv (possible, but wastes CPU and complicates mute)

**Definition of done**

* With a playing stream, moving MA slider produces a perceptible change within ~250ms.

---

### 4.2 Playback state model + metadata retention

You already receive:

* `group/update` with `playback_state`
* `server/state.metadata` with title/artist/progress

**Target outcome**

* Keep an internal state object:

  * connection_state: connected/disconnected
  * playback_state: playing/paused/stopped
  * volume/muted
  * metadata: title/artist/album/duration/position
* Emit **EventBus events** (even if no HA entity yet)

**Definition of done**

* Logs show “state changed” summaries rather than dumping raw payloads
* Another subsystem (future HA entity) can subscribe and update UI

---

### 4.3 Stream lifecycle robustness

Observed message types across your logs include:

* `stream/start`
* `stream/end` (seen earlier)
* maybe `stream/clear` (per spec)

**Target outcome**

* treat `stream/end` and `stream/stop` equivalently: stop sink + clear queue
* `stream/clear`: clear buffered audio immediately but keep sink alive if appropriate

**Definition of done**

* Starting and stopping tracks repeatedly never leaves mpv wedged or leaking processes
* No “stuck playing silence” states

---

### 4.4 Controller “send path” scaffolding (for Phase 3)

Right now you only **receive** `server/command`.
Your roadmap wants HA → Sendspin via `client/command.controller`.

**Target outcome**

* Add a method like `send_controller_command(cmd, **kwargs)`
* Don’t wire HA yet, just make it callable (and optionally test from a debug hook)

**Definition of done**

* You can programmatically trigger play/pause/next/prev/mute/volume and see MA react

---

### 4.5 Logging controls (match your roadmap)

You already quieted websockets. Next is making Sendspin logs “operator friendly”.

**Target outcome**

* Config toggles:

  * `debug_protocol` (log message types but not payloads)
  * `debug_timing` (buffer stats, underruns, offsets later)
* Replace raw payload dumps with compact summaries:

  * metadata: `"title - artist (pos/dur)"`
  * controller: `"volume=42 muted=false"`
  * stream: `"start pcm 48k/2/16"`

---

# 5) Suggested Work Breakdown (Practical Ordering)

**Milestone 1 — “Volume works”**

* mpv IPC socket + apply volume/mute on commands
* verify with MA slider + mute toggle during playback

**Milestone 2 — “State is publishable”**

* internal state dataclass
* EventBus emits: `sendspin/connection_state`, `sendspin/playback_state`, `sendspin/metadata`, `sendspin/volume`

**Milestone 3 — “Stream lifecycle solid”**

* handle `stream/end` / `stream/clear`
* ensure teardown correctness and no process leaks

**Milestone 4 — “Command send path exists”**

* implement `client/command.controller`
* manual smoke test (even without HA integration)

After these, you’re ready to start **Phase 2 (voice coordination)** and **Phase 3 (HA entity)** cleanly.

---

# 6) Key Gaps vs Your Roadmap (Explicit)

These are the deltas you should be aware of:

1. **Sink choice mismatch**

* Roadmap says “Option A SoundCard first”
* Implementation is “mpv sink first”
* That’s not necessarily wrong — you’ve already proven feasibility.
  But if you still want the SoundCard experiment for sync, that becomes a later pivot or parallel track.

2. **No timestamp-based scheduling**

* Multi-device sync claims in the roadmap depend on using the timestamp header and time sync offset.
* Current implementation ignores timestamps.

3. **No separate HA entity yet**

* That’s fine; you’re not ready until state + controller send-path are stable.

---

# 7) What I Need From You for the Next Phase Document to Become “Actionable PR Tasks”

You offered to paste all files. For the next phase (volume + state + stream lifecycle), the only additional code context I need is:

* `linux_voice_assistant/sendspin/models.py`
* `linux_voice_assistant/sendspin/__init__.py`
* `linux_voice_assistant/sendspin/discovery.py` (if it exists and is used)
* Where `SendspinClient` is instantiated/wired (likely `__main__.py` or a subsystem loader)
* Any existing mpv wrapper module in LVA you want reused (if you prefer not to spawn raw `mpv` directly)

If you paste those, I can produce a **single “next-phase evaluation doc” as PR-ready tasks** (file-by-file changes, event names, and acceptance tests) without guessing about your repo wiring.

