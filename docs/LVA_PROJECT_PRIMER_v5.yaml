tray_client:
  status: "Optional desktop-only component (not required for headless satellites)."
  package_location: "linux_voice_assistant/tray_client/"
  module_entrypoint: "python -m linux_voice_assistant.tray_client"
  primary_file: "linux_voice_assistant/tray_client/client.py"
  dependencies:
    managed_via: "pyproject.toml extras"
    extras_name: "tray"
    includes:
      - "PyQt5>=5.15"
  behavior:
    requires_mqtt: true
    notes: >
      The Tray Client loads config.json using linux_voice_assistant.config.load_config_from_json,
      derives the MQTT device_id using linux_voice_assistant.util.slugify_device_id,
      and uses models.SatelliteState for its known state names.
  systemd_control:
    config_key: "tray.systemd_service_name"
    default_unit: "linux-voice-assistant.service"

scripts_and_install:
  venv:
    location: ".venv (created by script/setup)"
  setup_script:
    path: "script/setup"
    purpose: "Create venv and install editable package + optional extras"
    options:
      dev: "--dev (extras: dev)"
      tray: "--tray (extras: tray)"
    semantics: >
      Options are additive. Example: script/setup --dev --tray installs core + both optional extras.
  run_script:
    path: "script/run"
    purpose: "Run main LVA entrypoint using the repo venv if present"
    command: "python -m linux_voice_assistant"
  tray_script:
    path: "script/tray"
    purpose: "Run the Tray Client entrypoint using the repo venv if present"
    command: "python -m linux_voice_assistant.tray_client"

