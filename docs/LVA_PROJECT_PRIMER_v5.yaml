xvf3800_support:
  device: "Seeed reSpeaker XVF3800 USB 4‑Mic Array (vid=0x2886 pid=0x001a)"
  what_lva_controls_over_usb:
    leds:
      backend_file: "linux_voice_assistant/xvf3800_led_backend.py"
      controls:
        - "LED_EFFECT / LED_BRIGHTNESS / LED_SPEED / LED_COLOR / LED_RING_COLOR"
      notes: "No dependency on Seeed xvf_host.py; LVA speaks USB control transfers directly via pyusb."
    mute_button_and_hw_mute_led:
      backend_file: "linux_voice_assistant/xvf3800_button_controller.py"
      notes: >
        Reads GPO state to detect hardware mute changes and mirrors LVA mute state back to XVF3800.
  permissions_and_udev:
    why: "USB control endpoint requires access; running as root breaks PipeWire/PulseAudio user-session audio."
    recommendation: >
      Install the provided udev rule (XVF3800/99-respeaker-xvf3800.rules),
      add user to plugdev (or equivalent), and replug/reboot.
  startup_preflight:
    goal: >
      Mitigate intermittent "mic silent after boot" reports by applying a small, fast USB preflight at LVA startup.
    behavior: >
      When XVF3800 is configured (LED backend and/or button mode xvf3800), LVA performs:
      (1) connect to the USB control device
      (2) set audio routing for both USB channels to a stable ASR output mapping used during testing
      (3) if needed, issue an XVF3800 reboot, then continue startup
    channel_routing:
      command_family: "Audio Manager output mux (AUDIO_MGR_OP_L / AUDIO_MGR_OP_R)"
      known_good_mapping: "Set both channels to (category=7, source=3) aka 'ASR3' in Seeed tooling output."
      effect_on_lva: >
        LVA typically records 16 kHz mono; if the underlying device exposes 2ch,
        pipewire/pulse may downmix or pick a channel. Aligning both channels reduces asymmetry and
        helps avoid 'one channel silent' cases on some hosts.

