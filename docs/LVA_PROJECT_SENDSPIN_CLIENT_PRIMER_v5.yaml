# =============================================================================
# Linux Voice Assistant (LVA) — Sendspin Client Primer (v4, updated)
# =============================================================================
#
# This document is a *living primer* for the Sendspin client implementation in
# LVA (linux_voice_assistant/sendspin/*). It is intended to be practical:
# - what the client does today
# - how the timing/sync works today
# - what each config knob *actually* does in the current code
#
# NOTE: This file is YAML only in the sense that it is comment-friendly.
# It is not intended to be parsed as a strict machine configuration file.

# -----------------------------------------------------------------------------
# TL;DR
# -----------------------------------------------------------------------------
# - The Sendspin server (Music Assistant) pushes audio as binary frames.
# - Each audio frame includes a *server timestamp* (microseconds) that
#   represents the time of the first sample in the frame.
# - LVA maintains a clock sync model (Kalman filter) that maps:
#     server_time_us  -> local_monotonic_time_us
# - The player uses that mapping + a target latency to schedule PCM writes.
# - A small “late drop” policy prevents playing extremely late frames.
# - `stream/clear` uses **Option A**: drop queued audio only (do not restart mpv).

# =============================================================================
# 1) Roles and message flow
# =============================================================================
# LVA advertises these Sendspin roles in `client/hello`:
# - player@v1      : receives stream/start + binary audio frames; plays audio
# - metadata@v1    : receives metadata updates
# - controller@v1  : receives player commands (volume/mute) and can send control
#
# High-level flow:
#   connect -> client/hello -> server/hello -> client/state
#   ...
#   server may send:
#     - server/state       (capabilities + metadata)
#     - stream/start       (codec/rate/channels/etc)
#     - stream/clear       (seek-style “clear queued audio, keep stream alive”)
#     - stream/end/stop    (end stream)
#     - server/time        (clock sync response to client/time)
#   server sends audio as binary frames while streaming.

# =============================================================================
# 2) Time sync and clock model
# =============================================================================
# LVA uses a monotonic clock (time.monotonic_ns) for all timing.
# There is no dependency on system wall clock or OS NTP.
#
# ## 2.1) NTP-like exchange
# LVA periodically sends:
#   client/time { client_transmitted: t1 }
# and the server replies:
#   server/time { client_transmitted: t1, server_received: t2, server_transmitted: t3 }
# LVA uses its local receive time t4.
#
# Measured values:
#   rtt_us    = (t4 - t1) - (t3 - t2)
#   offset_us = ((t1 - t2) + (t4 - t3)) / 2
# where offset is defined as:
#   offset_us = local_time_us - server_time_us
#
# ## 2.2) Kalman filter (offset + drift)
# The client feeds measurements into a 2-state Kalman filter that estimates:
#   - offset_us       (local - server)
#   - drift_us_per_s  (≈ ppm)
# The filter adapts measurement noise based on RTT and can gate outliers.
# The player uses the current offset estimate to convert server timestamps to
# local timestamps for scheduling.
#
# ## 2.3) “Adaptive” time sync (SendspinCLI-style)
# The Sendspin CLI takes a “pick best sample” approach for better accuracy:
# it sends a short burst of client/time messages and uses the response with the
# lowest RTT as the sample to update the clock model.
#
# LVA supports the same pattern when `time_sync_adaptive` is enabled.
#
# Behavior:
# - Every `time_sync_interval_seconds`, LVA runs either:
#   - non-adaptive: one client/time exchange
#   - adaptive:     `time_sync_burst_count` exchanges spaced by
#                   `time_sync_burst_interval_ms`, then updates the Kalman model
#                   using ONLY the response with the smallest RTT.
#
# Why it helps:
# - It reduces bias from queueing jitter and transient Wi-Fi contention.
# - It produces a more stable offset estimate, which improves multi-room sync.

# =============================================================================
# 3) Timestamp-aware playout pipeline
# =============================================================================
# The player pipeline is designed to be codec-agnostic:
# - PCM: schedule and write PCM directly
# - FLAC: decode via ffmpeg and schedule decoded PCM
# - Opus: decode via ffmpeg (fallback) or direct decode path (if present)
#
# The key to synchronization is the *server timestamp* carried in each binary
# audio frame.
#
# ## 3.1) Scheduling model
# Each PCM chunk receives a “due time” in local monotonic microseconds:
#   due_us = server_to_local(server_ts_us)
#            + sync_target_latency_ms
#            + output_latency_ms
#
# where:
# - `server_to_local(server_ts_us)` uses the current clock offset estimate.
# - `sync_target_latency_ms` is a deliberately added delay that absorbs jitter.
# - `output_latency_ms` is a static per-device calibration offset.
#
# ## 3.2) Late-drop policy
# If a PCM chunk arrives “too late” (its due time is already in the past), the
# player can drop it instead of playing it late:
#   if late_by_us > sync_late_drop_ms: drop
#
# This prevents a device from audibly “dragging” behind the group after stalls.

# =============================================================================
# 4) stream/clear behavior (Option A)
# =============================================================================
# `stream/clear` is used by the server for seek-like operations.
# Current implementation:
# - Drop queued audio in the player pipeline
# - Do NOT restart mpv
# - Do NOT tear down the decoder subprocess
#
# Why:
# - Restarting mpv tends to introduce large, inconsistent latency changes.
# - Keeping the sink alive gives more stable timing behavior.
#
# NOTE: There is one subtlety: some audio may already be dequeued into an mpv
# pipe write loop when clear occurs. To prevent “stale” audio from sneaking
# through, the player can enforce a short drop window after clear.

# =============================================================================
# 5) Configuration knobs (current behavior)
# =============================================================================
# All knobs live under `sendspin:` in config.json (JSONC).

# -----------------------------------------------------------------------------
# 5.1) Connection / clock sync
# -----------------------------------------------------------------------------
# sendspin.connection
#
# - mdns (bool, default true)
#     If true, attempt mDNS discovery of the Sendspin server.
#     If `server_host` is set, discovery is bypassed.
#
# - server_host/server_port/server_path
#     Optional static endpoint override.
#
# - hello_timeout_seconds (float, default 8.0)
#     Timeout waiting for server/hello after connect.
#
# - ping_interval_seconds / ping_timeout_seconds
#     Optional websocket pings. These are disabled by default in many LVA
#     configs because some servers can mis-handle protocol pings during idle.
#
# - time_sync_interval_seconds (float, default 5.0)
#     How often to perform time sync. If <= 0, the time sync loop is disabled.
#
# - time_sync_adaptive (bool, default false)
#     If true, use a burst of measurements and apply only the best RTT sample.
#     This generally produces tighter sync than a single sample.
#
# - time_sync_burst_count (int, default 5)
#     Number of samples per burst when time_sync_adaptive is true.
#
# - time_sync_burst_interval_ms (int, default 60)
#     Spacing between samples in a burst.

# -----------------------------------------------------------------------------
# 5.2) Player timing / buffering
# -----------------------------------------------------------------------------
# sendspin.player
#
# - sync_target_latency_ms (int, default 250)
#     Adds *intentional* playout latency. Higher values:
#     - make playback more resilient to network jitter
#     - increase end-to-end delay
#
# - sync_late_drop_ms (int, default 150)
#     Drop threshold for late PCM chunks.
#     - Higher values => fewer drops but more “late” audio when the device lags.
#     - Lower values => more aggressive catching-up (but can sound choppy).
#
# - output_latency_ms (int, default 0)
#     Static per-device timing offset (calibration).
#
#     IMPORTANT (matches Sendspin CLI behavior):
#     - This value may be **negative**.
#     - In limited testing, many devices benefit from a *negative* value
#       (e.g. -100 to -150 ms) because local audio stacks (PulseAudio/PipeWire/
#       ALSA + hardware) often add buffering that is not visible to Sendspin.
#
#     Sign meaning in LVA:
#     - More positive => play *later* (adds delay)
#     - More negative => play *earlier* (reduces delay)
#
# - clear_drop_window_ms (int, default 200)
#     After `stream/clear`, drop any chunks that were scheduled within the next
#     N ms. This reduces the chance of playing stale audio that was already
#     dequeued for writing.
#     Set to 0 to disable post-clear dropping.
#
# Other player knobs still exist (codec selection, buffer_capacity_bytes, etc.)
# but the timing-specific behavior is driven primarily by the four knobs above.

# =============================================================================
# 6) Recommended tuning workflow
# =============================================================================
# 1) Start with defaults:
#      sync_target_latency_ms = 250
#      sync_late_drop_ms      = 150
#      output_latency_ms      = 0
#      clear_drop_window_ms   = 200
#
# 2) Enable adaptive time sync (recommended on Wi-Fi):
#      time_sync_adaptive = true
#
# 3) If a device is consistently behind the group by a roughly constant amount:
#      decrease output_latency_ms (make it more negative)
#
#    If a device is consistently ahead of the group:
#      increase output_latency_ms (make it more positive)
#
# 4) If you observe periodic late-drop bursts (lots of “dropping late PCM chunk”):
#    - Increase sync_target_latency_ms slightly (e.g. 250 -> 350)
#    - Or relax sync_late_drop_ms (e.g. 150 -> 220)
#
# 5) If you see seek/skip operations smear or briefly play stale audio:
#    - Increase clear_drop_window_ms (e.g. 200 -> 300)

# =============================================================================
# 7) Observability
# =============================================================================
# LVA emits a `sendspin_clock_sync` event (EventBus/MQTT integration may map it
# into HA later). Current payload keys:
#
#   offset_us           float
#   drift_ppm           float
#   offset_stddev_us    float
#   samples             int
#   last_rtt_us         int
#   ewma_rtt_us         float
#   ewma_jitter_us      float
#   synced              bool
#
# Player logs that are especially useful for sync debugging:
# - stream start line shows the effective timing knobs being used
# - “dropping late PCM chunk (late_by=...)” indicates the player is catching up
#   rather than playing late.

